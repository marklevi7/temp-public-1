<title>Mark Levi Life</title>
<meta name="description" content="Mark Levi Life — блог про жизнь. Все ссылки в одном месте.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1115;--card:#171a21;--fg:#f4f5f7;--muted:#9aa3b2;
  --line:#262b35;--accent:#5b8cff;
}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--fg);
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  padding:48px 20px 40px;line-height:1.4;
  -webkit-font-smoothing:antialiased;
}
.wrap{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center}
.avatar{
  width:120px;height:120px;border-radius:50%;object-fit:cover;display:block;
  border:3px solid var(--line);box-shadow:0 8px 30px rgba(0,0,0,.4);
}
h1{font-size:24px;font-weight:700;margin-top:18px;text-align:center}
.tagline{color:var(--muted);font-size:15px;margin-top:6px;text-align:center}
.links{width:100%;margin-top:32px;display:flex;flex-direction:column;gap:12px}
.links a{
  display:flex;align-items:center;gap:12px;
  background:var(--card);color:var(--fg);text-decoration:none;
  padding:16px 18px;border-radius:14px;border:1px solid var(--line);
  font-size:16px;font-weight:600;
  transition:transform .12s ease,border-color .12s ease,background .12s ease;
}
.links a:hover{transform:translateY(-2px);border-color:var(--accent);background:#1d212b}
.links a:active{transform:translateY(0)}
.ico{width:22px;text-align:center;font-size:18px;flex:0 0 22px}
.arr{margin-left:auto;color:var(--muted);font-size:18px}
footer{margin-top:36px;color:var(--muted);font-size:12px;text-align:center}
.ver{opacity:.55;margin-top:4px}
@media(prefers-color-scheme:light){
  :root{--bg:#f6f7f9;--card:#fff;--fg:#10131a;--muted:#5b6472;--line:#e6e8ee}
  .links a:hover{background:#f0f3ff}
}
</style>
</head>
