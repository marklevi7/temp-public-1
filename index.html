.wrap{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1}
.avatar{
  width:184px;height:184px;border-radius:50%;object-fit:cover;display:block;
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 18px 50px rgba(0,0,0,.55),0 0 0 8px rgba(255,255,255,.03);
}
h1{font-size:30px;font-weight:800;margin-top:22px;text-align:center;letter-spacing:-.5px}
.eyebrow{margin-top:16px;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);opacity:.75}
.tags{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;margin-top:12px;max-width:380px}
.tag{
  font-size:13px;font-weight:600;color:#d6dce6;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.11);
  padding:9px 15px;border-radius:999px;
  -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  box-shadow:0 2px 12px rgba(0,0,0,.25),inset 0 0 12px rgba(120,160,255,.05);
  white-space:nowrap;
}
.links{width:100%;margin-top:32px;display:flex;flex-direction:column;gap:12px}
.links a{
  position:relative;overflow:hidden;isolation:isolate;
  display:flex;align-items:center;gap:14px;
  color:var(--fg);text-decoration:none;
  padding:19px 18px;border-radius:24px;
  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.02));
  -webkit-backdrop-filter:blur(2px) saturate(150%) brightness(1.12);
  backdrop-filter:url(#liquid-glass) blur(2px) saturate(150%) brightness(1.12);
  box-shadow:0 14px 38px rgba(0,0,0,.45),0 1px 0 rgba(255,255,255,.06),
    inset 0 1px 1px rgba(255,255,255,.85),
    inset 0 0 0 1px rgba(255,255,255,.05),
    inset 0 -10px 20px rgba(255,255,255,.05);
  font-size:16px;font-weight:600;letter-spacing:.2px;
  transition:transform .2s cubic-bezier(.2,.7,.2,1),border-color .2s ease,box-shadow .2s ease,background .2s ease;
}
/* glossy reflection streak across the top — the glass tell */
.links a::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:0;
  background:linear-gradient(158deg,rgba(255,255,255,.45) 0%,rgba(255,255,255,.10) 14%,rgba(255,255,255,0) 30%,rgba(255,255,255,0) 82%,rgba(255,255,255,.08) 100%);
  mix-blend-mode:screen}
.links a>*{position:relative;z-index:1}
.links a:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.24);
  background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.04));
  box-shadow:0 20px 46px rgba(0,0,0,.5),0 0 0 1px rgba(63,185,143,.3),
    inset 0 1px 1px rgba(255,255,255,1),
    inset 0 0 0 1px rgba(255,255,255,.07),
    inset 0 -10px 20px rgba(255,255,255,.06)}
.links a:active{transform:translateY(0)}
.ico{width:24px;height:24px;flex:0 0 24px;display:flex;align-items:center;justify-content:center;color:var(--fg)}
.ico svg{width:22px;height:22px;display:block}
.arr{margin-left:auto;color:var(--muted);font-size:18px}
.links a:hover .arr{color:var(--accent)}
.qr-toggle{position:absolute;opacity:0;pointer-events:none}
.qr-btn{
  position:fixed;top:16px;right:16px;z-index:20;
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--fg);overflow:hidden;isolation:isolate;
  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.03));
  -webkit-backdrop-filter:blur(2px) saturate(150%) brightness(1.12);
  backdrop-filter:url(#liquid-glass) blur(2px) saturate(150%) brightness(1.12);
  box-shadow:0 10px 24px rgba(0,0,0,.42),
    inset 0 1px 1px rgba(255,255,255,.9),inset 0 0 0 1px rgba(255,255,255,.05);
  transition:transform .18s cubic-bezier(.2,.7,.2,1),border-color .18s ease}
.qr-btn::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:0;
  background:linear-gradient(150deg,rgba(255,255,255,.55),rgba(255,255,255,0) 45%);
  mix-blend-mode:screen}
.qr-btn svg{position:relative;z-index:1}
.qr-btn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.24)}
.qr-btn svg{width:22px;height:22px;display:block}
.qr-modal{
  position:fixed;inset:0;z-index:19;display:none;
  align-items:center;justify-content:center;padding:24px;
  background:rgba(3,4,8,.72);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  cursor:pointer;
}
.qr-toggle:checked ~ .qr-modal{display:flex}
.qr-card{
  width:min(78vw,300px);padding:18px;border-radius:22px;
  background:#fff;box-shadow:0 24px 70px rgba(0,0,0,.6);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.qr-card svg{display:block;width:100%;height:auto;border-radius:8px}
.qr-card span{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#5b6472;font-weight:600}
footer{margin-top:40px;color:var(--muted);font-size:12px;text-align:center}
.ver{opacity:.45;margin-top:4px}
