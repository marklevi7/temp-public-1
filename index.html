.wrap{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1}
.avatar{
  width:184px;height:184px;border-radius:50%;object-fit:cover;display:block;

  box-shadow:0 18px 50px rgba(0,0,0,.55),0 0 0 8px rgba(255,255,255,.03);
}
h1{font-size:30px;font-weight:800;margin-top:22px;text-align:center;letter-spacing:-.5px}
.eyebrow{margin-top:16px;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);opacity:.75}
.tags{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;margin-top:12px;max-width:380px}
.tag{
  font-size:13px;font-weight:600;color:#d6dce6;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.11);
  padding:9px 15px;border-radius:999px;
  -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  box-shadow:0 2px 12px rgba(0,0,0,.25),inset 0 0 12px rgba(120,160,255,.05);
  white-space:nowrap;
}
.links{width:100%;margin-top:32px;display:flex;flex-direction:column;gap:12px}
.links a{
  display:flex;align-items:center;gap:14px;
  background:var(--card);color:var(--fg);text-decoration:none;
  padding:17px 18px;border-radius:14px;border:1px solid var(--line);
  font-size:16px;font-weight:600;letter-spacing:.2px;
  transition:transform .14s ease,border-color .14s ease,background .14s ease;
}
.links a:hover{transform:translateY(-2px);border-color:var(--accent);background:rgba(255,255,255,.07)}
.links a:active{transform:translateY(0)}
.ico{width:24px;height:24px;flex:0 0 24px;display:flex;align-items:center;justify-content:center;color:var(--fg)}
.ico svg{width:22px;height:22px;display:block}
.arr{margin-left:auto;color:var(--muted);font-size:18px}
.links a:hover .arr{color:var(--accent)}
footer{margin-top:40px;color:var(--muted);font-size:12px;text-align:center}
.ver{opacity:.45;margin-top:4px}
