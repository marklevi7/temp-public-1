<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0d10">
<title>Mark Levi Life</title>
<meta name="description" content="Mark Levi Life — блог про жизнь. Все ссылки в одном месте.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0d10;--card:rgba(255,255,255,.045);--fg:#f3f5f7;--muted:#9aa1ab;
  --line:rgba(255,255,255,.10);--accent:#3fb98f;
}
:root{color-scheme:dark}
html{-webkit-text-size-adjust:100%;background:#05060a}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--fg);background:radial-gradient(ellipse at bottom,#1b2735 0%,#0a0b12 55%,#05060a 100%) fixed;
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  padding:56px 20px 40px;line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
.wrap{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1}
.avatar{
  width:138px;height:138px;border-radius:50%;object-fit:cover;display:block;position:relative;
  box-shadow:0 14px 40px rgba(0,0,0,.5);
}
h1{font-size:30px;font-weight:800;margin-top:22px;text-align:center;letter-spacing:-.5px}
.eyebrow{margin-top:16px;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);opacity:.75}
.tags{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;margin-top:12px;max-width:380px}
.tag{
  font-size:13px;font-weight:600;color:#d6dce6;
  background:rgba(255,255,255,.028);
  border:1px solid rgba(255,255,255,.11);
  padding:9px 15px;border-radius:999px;
  -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  box-shadow:0 2px 12px rgba(0,0,0,.25),inset 0 0 12px rgba(120,160,255,.05);
  white-space:nowrap;
}
.links{position:relative;width:100%;margin-top:32px;display:flex;flex-direction:column;gap:12px}
/* buttons are transparent; the WebGL canvas paints the refractive glass behind them */
.links a{
  position:relative;
  display:flex;align-items:center;gap:14px;
  color:var(--fg);text-decoration:none;
  padding:19px 22px;border-radius:999px;
  background:transparent;
  font-size:16px;font-weight:600;letter-spacing:.2px;
  text-shadow:0 1px 6px rgba(0,0,0,.35);
  transition:transform .2s cubic-bezier(.2,.7,.2,1);
}
.links a:active{transform:scale(.99)}
#glass-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;display:block;pointer-events:none}
/* fallback tint if WebGL is unavailable */
.no-webgl .links a{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.ico{width:24px;height:24px;flex:0 0 24px;display:flex;align-items:center;justify-content:center;color:var(--fg)}
.ico svg{width:22px;height:22px;display:block}
.arr{margin-left:auto;color:var(--muted);font-size:18px}
.links a:hover .arr{color:var(--accent)}
.qr-toggle{position:absolute;opacity:0;pointer-events:none}
.qr-btn{
  position:fixed;top:16px;right:16px;z-index:20;
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--fg);
  background:rgba(255,255,255,.028);
  border:1px solid rgba(255,255,255,.11);
  -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  box-shadow:0 2px 12px rgba(0,0,0,.25),inset 0 0 12px rgba(120,160,255,.05);
  transition:transform .18s cubic-bezier(.2,.7,.2,1),border-color .18s ease}
.qr-btn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.22)}
.qr-btn svg{width:22px;height:22px;display:block}
.qr-modal{
  position:fixed;inset:0;z-index:19;display:none;
  align-items:center;justify-content:center;padding:24px;
  background:rgba(3,4,8,.72);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  cursor:pointer;
}
.qr-toggle:checked ~ .qr-modal{display:flex}
.qr-card{
  width:min(78vw,300px);padding:18px;border-radius:22px;
  background:#fff;box-shadow:0 24px 70px rgba(0,0,0,.6);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.qr-card svg{display:block;width:100%;height:auto;border-radius:8px}
.qr-card span{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#5b6472;font-weight:600}
footer{margin-top:40px;color:var(--muted);font-size:12px;text-align:center}
.ver{opacity:.45;margin-top:4px}
/* glass controls: round toggle button (top-left, matches the QR button) + floating body */
#panel{font:14px/1.3 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#e6ebf2}
#panel .hd{position:fixed;top:16px;left:16px;z-index:20;
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--fg);
  background:rgba(255,255,255,.028);
  border:1px solid rgba(255,255,255,.11);
  -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  box-shadow:0 2px 12px rgba(0,0,0,.25),inset 0 0 12px rgba(120,160,255,.05);
  transition:transform .18s cubic-bezier(.2,.7,.2,1),border-color .18s ease}
#panel .hd svg{width:22px;height:22px;display:block}
#panel .hd:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.22)}
#panel .bd{position:fixed;top:72px;left:16px;z-index:19;width:min(90vw,340px);
  max-height:0;overflow:hidden;opacity:0;pointer-events:none;
  transition:max-height .3s ease,opacity .2s ease;
  border-radius:16px;background:rgba(10,12,18,.92);
  -webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.1);box-shadow:0 22px 54px rgba(0,0,0,.55)}
#panel.open .bd{max-height:35vh;opacity:1;pointer-events:auto;overflow-y:auto;-webkit-overflow-scrolling:touch}
#panel .grid{padding:14px 16px 6px;display:flex;flex-direction:column;gap:14px}
#panel .ctl{display:grid;grid-template-columns:118px 1fr 42px;align-items:center;gap:10px}
#panel .ctl label{color:#aab3c2}
#panel .ctl input[type=range]{width:100%;height:26px;accent-color:#3fb98f}
#panel .ctl .val{text-align:right;color:#eef2f8;font-variant-numeric:tabular-nums}
#panel .row{display:flex;gap:9px;padding:8px 16px 16px}
#panel button.act{background:rgba(255,255,255,.09);color:#e6ebf2;
  border:1px solid rgba(255,255,255,.16);border-radius:9px;padding:9px 13px;font-weight:600;font-size:14px;cursor:pointer}
#panel button.act:active{transform:scale(.98)}
#panel.open .chev{transform:rotate(180deg)}
</style>
</head>

<script id="glassFrag" type="x-shader/x-fragment">
precision mediump float;
uniform vec2 iRes;
uniform float iTime;
uniform sampler2D iTex;
uniform int uCount;
uniform vec4 uBox[6];
uniform float uK, uWarpExp, uChroma, uBlur, uBright, uMilk;
uniform vec3 uTint;
uniform float uHL, uHLx, uHLy, uHLsize, uHLsharp;
uniform float uRim, uRimStart, uRadius, uEdge, uInner, uSpeed, uParallax;
vec3 bg(vec2 u, float drift){
  vec3 g = mix(vec3(0.105,0.150,0.208), vec3(0.020,0.024,0.040), clamp(u.y,0.0,1.0));
  float pr = uParallax;
  // three depth layers moving at different speeds/scales -> parallax
  vec3 s = vec3(0.0);
  // far: small, slow, dim  ->  near: big, fast, bright
  s += texture2D(iTex, vec2(u.x*1.4,       fract(u.y*1.4  - drift*0.35))).rgb * 0.38;
  s += texture2D(iTex, vec2(u.x*1.0+0.37,  fract(u.y*1.0  - drift*(0.8+0.6*pr)))).rgb * 0.72;
  s += texture2D(iTex, vec2(u.x*0.62+0.13, fract(u.y*0.62 - drift*(1.5+2.4*pr)))).rgb * (0.85+0.55*pr);
  return g + s;
}
float hsh(float n){ return fract(sin(n)*43758.5453123); }
// one comet with a random trajectory each appearance
vec3 oneComet(vec2 p, vec2 A, float t, float per, float seed, float len, float w){
  float tt=t/per+seed; float cyc=floor(tt); float ph=fract(tt);
  float a=hsh(cyc*1.7+seed*3.1), b=hsh(cyc*2.3+seed*7.7);
  float cc=hsh(cyc*3.9+seed*1.3), d=hsh(cyc*5.1+seed*9.2);
  // random start (upper band) and end (lower band), varied x -> varied angle
  vec2 s0=vec2(mix(-0.25,1.25,a), mix(0.70,1.10,b))*A;
  vec2 e0=vec2(mix(-0.25,1.25,cc), mix(-0.10,0.55,d))*A;
  float win=0.30;
  float active=smoothstep(0.0,0.03,ph)*smoothstep(win,win-0.05,ph);
  vec2 head=mix(s0,e0,clamp(ph/win,0.0,1.0));
  vec2 dir=normalize(e0-s0);
  vec2 rel=p-head;
  float along=dot(rel,-dir), perp=abs(dot(rel,vec2(-dir.y,dir.x)));
  float tail=clamp(1.0-along/len,0.0,1.0)*step(0.0,along);
  float body=smoothstep(w*(0.25+0.75*(1.0-along/len)),0.0,perp)*tail;
  float head0=smoothstep(0.02,0.0,length(rel));
  return (head0*0.65 + body*0.7)*active*vec3(0.86,0.9,1.0);
}
// comets streak across occasionally, each at a random angle
vec3 comets(vec2 uv, float t){
  vec2 A = vec2(iRes.x/iRes.y, 1.0);
  vec2 p = uv*A;
  vec3 c = vec3(0.0);
  // single comet only — never two at once
  c += oneComet(p, A, t, 10.0, 0.0, 0.30, 0.006);
  return c;
}
// value noise + fBm (for the Milky Way nebula band)
float vhash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123); }
float vnoise(vec2 p){
  vec2 i=floor(p), f=fract(p);
  vec2 u=f*f*(3.0-2.0*f);
  return mix(mix(vhash(i),vhash(i+vec2(1.0,0.0)),u.x),
             mix(vhash(i+vec2(0.0,1.0)),vhash(i+vec2(1.0,1.0)),u.x),u.y);
}
float fbm2(vec2 p){
  float v=0.0, a=0.5;
  for(int i=0;i<4;i++){ v+=a*vnoise(p); p*=2.02; a*=0.5; }
  return v;
}
// domain-warped fBm nebula, concentrated along a diagonal galactic band
vec3 milkyway(vec2 uv, float drift){
  vec2 A=vec2(iRes.x/iRes.y,1.0);
  vec2 p=uv*A;
  float ca=cos(-0.55), sa=sin(-0.55);
  vec2 q=mat2(ca,-sa,sa,ca)*(p-vec2(0.72,0.52));
  float band=exp(-q.y*q.y*6.5);
  vec2 pf=p+vec2(0.0,-iTime*(uSpeed*0.8+0.008));  // visible slow upward drift (baseline + scales with star speed)
  vec2 w=vec2(fbm2(pf*3.0), fbm2(pf*3.0+5.2));    // domain warp
  float n=fbm2(pf*3.2 + w*1.6);
  float dust=fbm2(pf*6.5 + w*2.2);
  vec3 col=vec3(0.0);
  col += vec3(0.15,0.12,0.27) * band * smoothstep(0.28,0.9,n) * 0.95;   // purple haze
  col += vec3(0.09,0.15,0.30) * band * smoothstep(0.42,1.0,n) * 0.65;   // blue
  col += vec3(0.30,0.13,0.22) * band * smoothstep(0.55,1.0,n) * 0.35;   // magenta wisps
  col *= mix(1.0, 0.32, smoothstep(0.45,0.78,dust)*band);               // dark dust lanes
  col += vec3(0.05,0.05,0.09) * band*band;                              // faint core glow
  return col;
}
// signed distance to a rounded rectangle (negative inside)
float sdRoundRect(vec2 rel, vec2 hs, float r){
  vec2 q = abs(rel) - hs + vec2(r);
  return min(max(q.x, q.y), 0.0) + length(max(q, vec2(0.0))) - r;
}
void main(){
  vec2 fc = gl_FragCoord.xy;
  vec2 uv = fc / iRes;
  float drift = iTime * uSpeed;
  vec3 col = bg(uv, drift) + milkyway(uv, drift) + comets(uv, iTime);
  for(int i=0;i<6;i++){
    if(i>=uCount) break;
    vec2 c = uBox[i].xy;
    vec2 hs = uBox[i].zw;
    vec2 p = (fc - c) / hs;
    float radius = min(hs.x, hs.y);   // full pill (wide boxes) / circle (square avatar)
    float sd = sdRoundRect(fc - c, hs, radius);
    float edgeSpan = min(hs.x, hs.y);
    float d = clamp(1.0 + sd / edgeSpan, 0.0, 1.4);
    if(sd < 2.0){
      float warp = pow(d, uWarpExp) * uK;
      vec2 basev = fc - c;
      vec2 luvR = (basev * (1.0 - warp*(1.0+uChroma)) + c) / iRes;
      vec2 luvG = (basev * (1.0 - warp) + c) / iRes;
      vec2 luvB = (basev * (1.0 - warp*(1.0-uChroma)) + c) / iRes;
      vec3 acc = vec3(0.0); float tot = 0.0;
      for(float x=-2.0;x<=2.0;x++){
        for(float y=-2.0;y<=2.0;y++){
          vec2 o = vec2(x,y) * uBlur / iRes;
          acc.r += bg(luvR + o, drift).r;
          acc.g += bg(luvG + o, drift).g;
          acc.b += bg(luvB + o, drift).b;
          tot += 1.0;
        }
      }
      acc /= tot;
      acc += milkyway(luvG, drift) + comets(luvG, iTime);
      vec3 glass = acc * uBright;
      glass = mix(glass, uTint, uMilk);
      float hl = clamp(1.0 - length(p - vec2(uHLx, uHLy)) * uHLsize, 0.0, 1.0);
      glass += pow(hl, uHLsharp) * uHL;
      float rim = smoothstep(uRimStart, 1.0, d) * (1.0 - smoothstep(1.0, 1.06, d));
      glass += rim * uRim;
      glass += smoothstep(0.9, 0.55, d) * uInner;
      float m = 1.0 - smoothstep(-uEdge, uEdge, sd);
      col = mix(col, min(glass, vec3(1.0)), m);
    }
  }
  gl_FragColor = vec4(col, 1.0);
}

<script>
(function(){

  for(var i=0;i<540;i++){

    cx.beginPath(); cx.arc(kx,ky,kr,0,6.2832); cx.fillStyle='rgba(255,255,255,0.95)'; cx.fill();
  }
  var VS = 'attribute vec2 p;void main(){gl_Position=vec4(p,0.0,1.0);}';
  var FS = document.getElementById('glassFrag').textContent;
  function mk(t,s){ var o=gl.createShader(t); gl.shaderSource(o,s); gl.compileShader(o);
    if(!gl.getShaderParameter(o,gl.COMPILE_STATUS)){ console.error(gl.getShaderInfoLog(o)); } return o; }
  var prog=gl.createProgram();
  gl.attachShader(prog,mk(gl.VERTEX_SHADER,VS));
  gl.attachShader(prog,mk(gl.FRAGMENT_SHADER,FS));
  gl.linkProgram(prog); gl.useProgram(prog);
  var buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  var loc=gl.getAttribLocation(prog,'p'); gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  var U={res:gl.getUniformLocation(prog,'iRes'),time:gl.getUniformLocation(prog,'iTime'),
    tex:gl.getUniformLocation(prog,'iTex'),count:gl.getUniformLocation(prog,'uCount'),
    box:gl.getUniformLocation(prog,'uBox')};
  var tex=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,true);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,tc);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.REPEAT);

  var CFG=[
    ['uSpeed','Star speed',0,0.04,0.001,0.005],
    ['uParallax','Parallax depth',0,2,0.01,0.68],
    ['uK','Refraction',0,0.25,0.005,0.06],
    ['uWarpExp','Refraction falloff',1,6,0.1,5.5],
    ['uChroma','Chromatic aberration',0,0.25,0.005,0.19],
    ['uBlur','Frost blur',0,5,0.05,0],
    ['uBright','Interior brightness',0.6,1.8,0.01,1.19],
    ['uMilk','Frostiness (milk)',0,1,0.01,0.03],
    ['uHL','Reflection strength',0,2,0.01,0.2],
    ['uHLx','Reflection X',-1.2,1.2,0.01,-0.02],
    ['uHLy','Reflection Y',-1.2,1.2,0.01,0.89],
    ['uHLsize','Reflection size',0.4,3,0.01,1.21],
    ['uHLsharp','Reflection sharpness',0.4,5,0.05,0.4],
    ['uRim','Edge glow',0,0.74,0.01,0.08],
    ['uRimStart','Edge glow width',0.5,0.99,0.005,0.565],
    ['uInner','Inner lift',0,0.3,0.005,0.02]
  ];
  var P={}, ULoc={};
  CFG.forEach(function(c){ P[c[0]]=c[5]; ULoc[c[0]]=gl.getUniformLocation(prog,c[0]); });
  // edge softness kept fixed (no slider)
  P.uEdge=0.3; ULoc.uEdge=gl.getUniformLocation(prog,'uEdge');
  var tint=[0.72,0.78,0.92];
  var uTintLoc=gl.getUniformLocation(prog,'uTint');

  // ---- accordion controls panel ----
  function hx2rgb(h){var n=parseInt(h.slice(1),16);return [(n>>16&255)/255,(n>>8&255)/255,(n&255)/255];}
  function rgb2hx(c){function t(v){return ('0'+Math.round(v*255).toString(16)).slice(-2);}return '#'+t(c[0])+t(c[1])+t(c[2]);}
  var panel=document.createElement('div'); panel.id='panel';
  var rows='';
  CFG.forEach(function(c){
    rows+='<div class="ctl"><label>'+c[1]+'</label>'+
      '<input type="range" data-k="'+c[0]+'" min="'+c[2]+'" max="'+c[3]+'" step="'+c[4]+'" value="'+c[5]+'">'+
      '<span class="val" data-v="'+c[0]+'">'+c[5]+'</span></div>';
  });
  panel.innerHTML=
    '<div class="hd" id="panelHd" role="button" aria-label="Glass controls"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="9" cy="8" r="2.4" fill="#0c0d10"/><circle cx="15" cy="16" r="2.4" fill="#0c0d10"/></svg></div>'+
    '<div class="bd"><div class="grid">'+rows+'</div>'+
    '<div class="row"><button class="act" id="copyBtn">Copy settings</button>'+
    '<button class="act" id="resetBtn">Reset</button></div></div>';

  });

      var inp=panel.querySelector('input[data-k="'+c[0]+'"]'); inp.value=c[5];

    });
  });
  document.getElementById('copyBtn').addEventListener('click',function(){
    var out=Object.assign({},P,{uTint:tint});

    this.textContent='Copied!'; var b=this; setTimeout(function(){b.textContent='Copy settings';},1200);
  });

  var W,H;
  function resize(){ W=window.innerWidth; H=window.innerHeight; canvas.width=W; canvas.height=H; }
  resize();
  var els=document.querySelectorAll('.links a');
  var avatar=document.querySelector('.avatar');
  var start=performance.now();
  function frame(){
    resize();
    var data=[]; var n=Math.min(els.length,5);
    for(var i=0;i<n;i++){
      var r=els[i].getBoundingClientRect();
      data.push(r.left+r.width/2, H-(r.top+r.height/2), r.width/2, r.height/2);
    }
    var count=n;
    if(avatar && count<6){
      var ar=avatar.getBoundingClientRect(); var pad=30;
      data.push(ar.left+ar.width/2, H-(ar.top+ar.height/2), ar.width/2+pad, ar.height/2+pad);

    while(data.length<24) data.push(0);
    gl.viewport(0,0,W,H);
    gl.uniform2f(U.res,W,H);

    for(var k in ULoc){ gl.uniform1f(ULoc[k], P[k]); }

    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,tex); gl.uniform1i(U.tex,0);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    requestAnimationFrame(frame);
  }
  frame();
  window.addEventListener('resize',resize);
})();
