<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0c0d10">
<title>Mark Levi Life</title>
<meta name="description" content="Mark Levi Life — блог про жизнь. Все ссылки в одном месте.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0d10;--card:rgba(255,255,255,.045);--fg:#f3f5f7;--muted:#9aa1ab;
  --line:rgba(255,255,255,.10);--accent:#3fb98f;
}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--fg);background:var(--bg);
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  padding:56px 20px 40px;line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(120% 80% at 50% -10%,#1b1f26 0%,rgba(27,31,38,0) 60%),
    radial-gradient(90% 60% at 50% 110%,rgba(63,185,143,.10) 0%,rgba(12,13,16,0) 55%),
    linear-gradient(180deg,#101216 0%,#0c0d10 100%);
}
.wrap{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center}
.avatar{
  width:184px;height:184px;border-radius:50%;object-fit:cover;display:block;
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 18px 50px rgba(0,0,0,.55),0 0 0 8px rgba(255,255,255,.03);
}
h1{font-size:30px;font-weight:800;margin-top:22px;text-align:center;letter-spacing:-.5px}
.tagline{color:var(--muted);font-size:15px;margin-top:8px;text-align:center;max-width:340px}
.links{width:100%;margin-top:32px;display:flex;flex-direction:column;gap:12px}
.links a{
  display:flex;align-items:center;gap:14px;
  background:var(--card);color:var(--fg);text-decoration:none;
  padding:17px 18px;border-radius:14px;border:1px solid var(--line);
  font-size:16px;font-weight:600;letter-spacing:.2px;
  transition:transform .14s ease,border-color .14s ease,background .14s ease;
}
.links a:hover{transform:translateY(-2px);border-color:var(--accent);background:rgba(255,255,255,.07)}
.links a:active{transform:translateY(0)}
.ico{width:24px;height:24px;flex:0 0 24px;display:flex;align-items:center;justify-content:center;color:var(--fg)}
.ico svg{width:22px;height:22px;display:block}
.arr{margin-left:auto;color:var(--muted);font-size:18px}
.links a:hover .arr{color:var(--accent)}
footer{margin-top:40px;color:var(--muted);font-size:12px;text-align:center}
.ver{opacity:.45;margin-top:4px}
</style>
</head>
